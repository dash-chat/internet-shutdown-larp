# The anonymous informant (docs/design.md). NOT a scenario pack: this file
# must stay out of scenarios/ (every character bot parses that whole
# directory as mission packs, and this schema is different). Texts are sent
# VERBATIM into the direct chat, in order: first `reveal`, then the flashed
# station's variant. Each station runs ONE variant (characters::flash picks
# it), so a pair of players must combine what their two informants told them.

name = "Anonymous"

reveal = [
  """🕵️ You don't know me. I work inside the town hall — that's all I can say. Listen carefully: the mayor is lying to all of you.""",
  """🔥 The fires were no accident. He ordered them lit himself — I've seen the papers. And it was HIM who shut down the internet and the phones, so nobody could check his story or call for help. A town that is cut off and afraid is a town he controls.""",
]

[variants]

# Flashed on one station: where the hidden code box is.
portal = [
  """🗝️ There is a way to expose him. On the town hall page — the one that pops up when you join the town hall wifi — there's his official portrait. Tap the mayor's HEAD and a hidden code box appears. I don't have the code; another friend of mine carries it. Find whoever else has talked to me.""",
]

# Flashed on the other station: the code itself.
code = [
  """🗝️ There is a way to expose him, but I only hold half of it. The code is: ahawegotyou — type it exactly like that. Where it goes, I never learned; a friend of mine on the other side found the door. Find whoever else has talked to me.""",
]
