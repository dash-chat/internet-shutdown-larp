# Journalist mission pack. Texts are sent VERBATIM (see firefighters.toml).
# This character is NOT in town: she reports from the outside world and is
# reachable only where there's internet (the hotspot corner of the map).

name = "Marta the journalist"

greeting = """📰 This is Marta from the national news desk. The whole country is watching your town, but nothing gets in or out since the fires broke out — except through this line. Bring me news from inside and I'll tell the world; I'll pass in whatever the outside knows!"""

[[missions]]
to = "firefighters"
text = """📰 Viewers near the town sent us photos: a new column of smoke is rising behind the old mill — the fire may have jumped the creek. The firefighters must check it out — get this to their station!"""
success = """🚒 On our way to the old mill with the pumper truck. Good thing the world is watching out for us!"""

[[missions]]
to = "hospital"
text = """📰 A field medic team from the regional capital is on its way and asks where they're needed most. The hospital must answer — carry this message to them!"""
success = """🏥 Perfect timing: send them straight to our emergency ward, we'll have assignments ready. Thank you, messenger!"""

[[missions]]
to = "relative"
text = """📰 I'm broadcasting a list of people confirmed safe so families everywhere can breathe again. Ask Anna in Riverside which names she's still missing — take her this note!"""
success = """💌 Bless you! I'm still waiting for news about my cousins from the mill neighborhood — please add them to your list!"""

[[missions]]
to = "hospital"
text = """📰 International aid wants numbers: how many injured has the hospital treated so far? They need the count to size the airlift. Get this question to the hospital!"""
success = """🏥 Current count: forty-seven treated, twelve admitted, all stable. Tell them we mostly need burn kits and surgical supplies!"""

[[missions]]
to = "firefighters"
text = """📰 Satellite images we aired show the wind pushing the fire toward the pine grove on the hill. If it takes hold there, the flames will run straight down into the lower streets. The firefighters must see this — run it to their station!"""
success = """🚒 We're sending a crew to cut a firebreak below the pine grove right now. That broadcast may have saved the whole lower town!"""
