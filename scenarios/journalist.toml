# Journalist mission pack. Texts are sent VERBATIM (see firefighters.toml).
# This character is NOT in town: she is the town's only line to the outside
# world, reachable only where there's internet (the hotspot corner of the map).
# She never acts in town affairs herself: everything she sends down is a
# message she relays from nearby towns and the outside world, and everything
# the town brings her she publishes outward.

name = "Marta the journalist"

greeting = """📰 Marta from the national news desk. Nothing gets in or out of your town except through this line. Bring me news and I'll tell the world — and I'll pass down whatever the outside sends you."""

[[missions]]
to = "firefighters"
text = """❓ 📰 From the village across the creek: "New smoke rising behind the old mill — the fire may have jumped the creek!" Get this to the firefighters!"""
success = """✅ 🚒 Pumper truck on its way to the old mill. Good thing the world is watching out for us!"""

[[missions]]
to = "hospital"
text = """❓ 📰 From the regional capital: "A field medic team is on its way — where are they needed most?" Carry this question to the hospital!"""
success = """✅ 🏥 Send them straight to our emergency ward. Thank you, messenger!"""

[[missions]]
to = "relative"
text = """❓ 📰 The families who fled ask: "Anna keeps the list of everyone confirmed safe — which names is she still missing?" Take her this note!"""
success = """✅ 💌 Bless you! I'm still missing my cousins from the mill neighborhood — add them to the list!"""

[[missions]]
to = "hospital"
text = """❓ 📰 The aid coordinators ask: "How many injured treated so far? We need the count to size the airlift." Get this question to the hospital!"""
success = """✅ 🏥 Forty-seven treated, twelve admitted, all stable. We mostly need burn kits and surgical supplies!"""

[[missions]]
to = "firefighters"
text = """❓ 📰 The regional fire watch warns: "The wind is pushing the fire toward the pine grove — from there it will run into the lower streets." Run this to the firefighters!"""
success = """✅ 🚒 Sending a crew to cut a firebreak below the pine grove. That warning may have saved the lower town!"""
