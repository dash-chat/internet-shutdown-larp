# Hospital mission pack. Texts are sent VERBATIM (see firefighters.toml).

name = "James the nurse"

greeting = """🏥 James here, nurse at the county hospital. Our phone lines are dead — please carry our messages, every minute counts!"""

[[missions]]
to = "firefighters"
text = """❓ 🏥 A woman is trapped by smoke at 12 Upper Street. Get this warning to the firefighters right away!"""
success = """✅ 🚒 Rescue team heading to 12 Upper Street now. Great work!"""

[[missions]]
to = "journalist"
text = """❓ 🏥 We urgently need type O negative blood donors. Have the journalist publish a call!"""
success = """✅ 📰 Published: O NEGATIVE DONORS NEEDED AT THE HOSPITAL. It's spreading!"""

[[missions]]
to = "relative"
text = """❓ 🏥 John is admitted with a burned arm but out of danger. His cousin Anna in Riverside doesn't know — get her the news!"""
success = """✅ 💌 Thank you!! We were so worried. Tell John we'll bring him his chocolates!"""

[[missions]]
to = "firefighters"
text = """❓ 🏥 Our generator is failing and patients are on life support. The firefighters have a portable one — take them this urgent request!"""
success = """✅ 🚒 Loading the portable generator onto the truck now. Hold on!"""

[[missions]]
to = "journalist"
text = """❓ 🏥 Smoke is blowing into our main entrance — everyone must use the north one. Take this notice to the journalist!"""
success = """✅ 📰 Published: HOSPITAL ADMITTING THROUGH THE NORTH ENTRANCE."""
