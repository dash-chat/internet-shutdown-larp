# Relative mission pack. Texts are sent VERBATIM (see firefighters.toml).
# Aunt Anna lives in Riverside, the nearby town; her station on the map is
# the town's radio link to Riverside (narratively — the bot runs right on
# that station's Pi, like every other character).

name = "Aunt Anna"

greeting = """💌 Hello?? This is Anna from Riverside, the next town over. My whole family is where the fires are and I can't reach anyone. Please carry my messages — you're my only connection!"""

# Anna answers the first message from the players after this long without
# hearing from them — she's been glued to the radio the whole time.
[comeback]
after_secs = 600
text = """💌 Hey! How is everything over there?"""

[[missions]]
to = "hospital"
text = """❓ 💌 My father Peter takes heart medication and is nearly out. Is he registered at the hospital? Take them Anna's question!"""
success = """✅ 🏥 Peter is here, stable, and his medication is restocked. He sends his love — don't worry, Anna."""

[[missions]]
to = "firefighters"
text = """❓ 💌 Flames look very close to our family house at 5 Willow Lane. Can the firefighters check on it? Bring them Anna's request!"""
success = """✅ 🚒 5 Willow Lane checked for Anna: the fence is scorched but the house stands. We hosed down the roof."""

[[missions]]
to = "journalist"
text = """❓ 💌 Riverside has gathered blankets, water and food. Where should the trucks go? Ask the journalist to find out — from Anna!"""
success = """✅ 📰 Broadcast out: RIVERSIDE AID TRUCKS TO THE SPORTS HALL PARKING LOT. Thank you Anna!"""

[[missions]]
to = "hospital"
text = """❓ 💌 My niece Clara is diabetic and was staying near the market square. If she reaches the hospital she needs insulin — warn the staff, from Anna!"""
success = """✅ 🏥 Noted on our watch list: Clara, diabetic — insulin ready if she comes in. We'll take good care of her."""

[[missions]]
to = "firefighters"
text = """❓ 💌 Our dog Max ran off scared of the smoke, last seen by the fountain. Could the firefighters keep an eye out? Anna's plea!"""
success = """✅ 🚒 Crews have Max's description — if he turns up, we'll bring him to the shelter."""
